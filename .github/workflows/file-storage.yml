name: File-to-GitHub Storage Pipeline

on:
  repository_dispatch:
    types: [ file-uploaded ]

jobs:
  save-file:
    name: Save uploaded file
    runs-on: ubuntu-latest

    steps:
      - name: Show received payload
        run: |
          echo "File received: ${{ github.event.client_payload.fileName }}"
          echo "Triggered at: $(date)"

      - name: Checkout storage repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STORAGE_REPO_TOKEN }}

      - name: Download file from Spring Boot server
        run: |
          FILE_NAME="${{ github.event.client_payload.fileName }}"
          DATE_FOLDER=$(date +'%Y/%m/%d')
          mkdir -p "uploads/$DATE_FOLDER"

          # Download the merged file from your running Spring Boot server
          curl -f -o "uploads/$DATE_FOLDER/$FILE_NAME" \
            "http://${{ secrets.SPRING_BOOT_HOST }}/api/download/$FILE_NAME" || \
          echo "WARNING: Could not download file - check SPRING_BOOT_HOST secret"

      - name: Commit and push file
        run: |
          FILE_NAME="${{ github.event.client_payload.fileName }}"
          DATE_FOLDER=$(date +'%Y/%m/%d')

          git config user.email "storage-bot@upload-system.local"
          git config user.name  "Upload Storage Bot"

          git add .
          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "Upload: $FILE_NAME [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push